name: Release Obsidian plugin

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine version
        id: version
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # On a tag push, the tag must match manifest.json exactly.
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF_NAME" != "$VERSION" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match manifest.json version '$VERSION'."
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create the GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # --target pins the tag to the exact commit we built and attested.
          gh release create "$VERSION" \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --generate-notes \
            main.js manifest.json styles.css
